services:

  # ─────────────────────────────────────────────
  # Reverse proxy — единая точка входа
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - media_data:/usr/share/nginx/media:ro
    networks:
      - internal
    depends_on:
      - backend
      - frontend

  # ─────────────────────────────────────────────
  # База данных
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  # ─────────────────────────────────────────────
  # Backend — FastAPI
  # ─────────────────────────────────────────────
  backend:
    build: ./backend
    image: localhost:5000/autobizlab/backend:latest
    container_name: backend
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
      - media_data:/app/media
    networks:
      - internal
    depends_on:
      - postgres

  # ─────────────────────────────────────────────
  # pgAdmin — веб-интерфейс PostgreSQL
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      SCRIPT_NAME: /pgadmin
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - internal

  # ─────────────────────────────────────────────
  # Frontend — Vite + React → Nginx (multi-stage build)
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend-src
    image: localhost:5000/autobizlab/frontend:latest
    container_name: frontend
    restart: unless-stopped
    networks:
      - internal

# ─────────────────────────────────────────────
# Сети
# ─────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    name: autobizlab_net

# ─────────────────────────────────────────────
# Тома
# ─────────────────────────────────────────────
volumes:
  postgres_data:
    name: autobizlab_postgres
    external: true
  media_data:
    name: autobizlab_media
