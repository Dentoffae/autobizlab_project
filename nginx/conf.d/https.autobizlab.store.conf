# TLS для autobizlab.store (SAN без www до исправления DNS www → тот же IP)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name autobizlab.store;

    ssl_certificate     /etc/letsencrypt/live/autobizlab.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autobizlab.store/privkey.pem;

    include /etc/nginx/snippets/security-headers-https.conf;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /pgadmin {
        return 301 /pgadmin/;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        return 301 /ru;
    }

    location /media/ {
        alias   /usr/share/nginx/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    location /pgadmin/ {
        include /etc/nginx/snippets/pgadmin-access.conf;
        set $upstream_pgadmin http://pgadmin:80;
        proxy_pass         $upstream_pgadmin$request_uri;
        proxy_set_header   X-Script-Name     /pgadmin;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_redirect     off;
        proxy_read_timeout 300s;
    }

    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_log_level warn;

        set $upstream_api http://backend:8000;
        proxy_pass         $upstream_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    location /api/ {
        limit_req zone=api_general burst=150 nodelay;
        limit_req_log_level warn;

        set $upstream_api http://backend:8000;
        proxy_pass         $upstream_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    location / {
        set $upstream_fe http://frontend:80;
        proxy_pass         $upstream_fe$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
    }
}
