# Основной сайт: autobizlab.store
#
# resolver + переменные в proxy_pass: после пересоздания контейнеров Docker
# меняется IP, а nginx по умолчанию кэширует старый адрес навсегда → 502.

# HTTP: редирект на HTTPS (кроме ACME); www → канонический хост без www (сертификат только apex)
server {
    listen 80;
    listen [::]:80;
    server_name autobizlab.store www.autobizlab.store;

    include /etc/nginx/snippets/security-headers-http.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        return 301 https://autobizlab.store/ru;
    }

    location / {
        return 301 https://autobizlab.store$request_uri;
    }
}

# Доступ по IP или иному Host — без TLS, прежнее поведение прокси
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    include /etc/nginx/snippets/security-headers-http.conf;

    location = /pgadmin {
        return 301 /pgadmin/;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        return 301 /ru;
    }

    # ── Загруженные медиафайлы ──
    location /media/ {
        alias   /usr/share/nginx/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── pgAdmin ── (полный $request_uri — иначе при proxy_pass с переменной ломается путь → редирект-петля)
    location /pgadmin/ {
        include /etc/nginx/snippets/pgadmin-access.conf;
        set $upstream_pgadmin http://pgadmin:80;
        proxy_pass         $upstream_pgadmin$request_uri;
        proxy_set_header   X-Script-Name     /pgadmin;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_redirect     off;
        proxy_read_timeout 300s;
    }

    # ── API → Backend (строгий лимит на вход / 2FA) ──
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_log_level warn;

        set $upstream_api http://backend:8000;
        proxy_pass         $upstream_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    location /api/ {
        limit_req zone=api_general burst=150 nodelay;
        limit_req_log_level warn;

        set $upstream_api http://backend:8000;
        proxy_pass         $upstream_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # ── Frontend SPA ──
    location / {
        set $upstream_fe http://frontend:80;
        proxy_pass         $upstream_fe$request_uri;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_intercept_errors off;
    }
}
